[tools]
shellcheck = "latest"
pre-commit = {version = "latest", postinstall = "pre-commit install"}
bats = "latest"
uv = "latest"
ty = "latest"
ruff = "latest"

[env]
_.python.venv = { path = ".venv" }

[hooks]
postinstall = ["mise run sync-core", "uv sync"]

[tasks.test]
description = "Run unit, integration and mechanism tests"
run = [
    { task="test:unit"},
    { task="test:integration"},
    { task="test:mechanism"},
]

[tasks."test:unit"]
description = "Run unit tests"
run = "uv run pytest -m unit -v --no-header"

[tasks."test:integration"]
description = "Run integration tests"
run = "uv run pytest -m integration -v --no-header"

[tasks."test:mechanism"]
description = "Run mechanism tests (no AI calls)"
run = "uv run pytest -m mechanism -v --no-header"

[tasks."test:e2e"]
description = "Run E2E full workflow tests (requires E2E_CONFIRM=1)"
env = { "E2E_CONFIRM" = "1" }
run = "uv run pytest -m e2e -v --no-header"

[tasks."test:e2e:full"]
description = "Run all E2E tests including mechanism tests"
env = { "E2E_CONFIRM" = "1" }
run = "uv run pytest -m 'e2e or mechanism' -v --no-header"

[tasks.lint]
description = "Lint Python files with ruff"
run = "ruff check bin/openspec-extended resources/opencode/scripts/osx-orchestrate tests/"

[tasks."typecheck"]
description = "Type check Python files with ty"
run = "ty check bin/openspec-extended resources/opencode/scripts/osx-orchestrate"
