repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: mise exec -- shellcheck -s bash --rcfile=.shellcheckrc
        language: system
        types: [shell]
        files: install.sh

      - id: check-version-bump
        name: Check version bump in versioned files
        entry: mise run version:check
        language: system
        files: ^(resources/(opencode|claude)/(skills/.*/(SKILL\.md|references/.*\.md)|agents/.*\.md|commands/.*\.md)|source/(cli|lib/osx|orchestrator/engine)\.py|install\.sh|pyproject\.toml)$
        pass_filenames: false

      - id: test
        name: Verify source code and tests
        entry: mise run verify
        language: system
        files: ^(source/|tests/|pyproject\.toml|openspec\.spec)$
        pass_filenames: false
