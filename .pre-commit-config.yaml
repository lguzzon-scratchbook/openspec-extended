repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: mise exec -- shellcheck -s bash --rcfile=.shellcheckrc
        language: system
        types: [shell]
        files: install.sh

      - id: check-version-bump
        name: Check version bump in versioned files
        entry: mise run version:check
        language: system
        files: ^(resources/(opencode|claude)/(skills/.*/(SKILL\.md|references/.*\.md)|agents/.*\.md|commands/.*\.md|scripts/(osx-orchestrate|lib/osx))|install\.sh|bin/openspecx-extended)$
        pass_filenames: false

      - id: test
        name: Verify osx-orchestrate script and its dependencies
        entry: mise run verify
        language: system
        files: ^(resources/opencode/scripts/|tests/)
        pass_filenames: false
